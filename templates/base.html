<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/Finance-rafiki.png') }}"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/light_mode.css') }}"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/dashboard">
          <img
            src="{{ url_for('static', filename='images/stock-exchange-app.png') }}"
            width="40"
            height="40"
            class="me-2"
          />
          Expense Tracker
        </a>

        <div>
          {% if session.get("user_id") %}
          <a href="/dashboard" class="btn btn-outline-light btn-dashboard me-2">
            Dashboard
          </a>

          <a href="/add-expense" class="btn btn-outline-light btn-expense me-2">
            Add Expense
          </a>

          <a href="/reports" class="btn btn-outline-light btn-reports me-2">
            Reports
          </a>

          <a href="/logout" class="btn btn-danger btn-logout"> Logout </a>
          <button id="themeToggle" class="theme-btn ms-2">🌙</button>
          {% else %}
          <a href="/login" class="btn btn-outline-dark me-2">Login</a>
          <a href="/signup" class="btn btn-success">Signup</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    {% block content %} {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Charts -->
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>

    <!-- Theme Toggle Script -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  </body>
</html>
